<!DOCTYPE html>
<html ng-app="marketplaceApp">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JioMart - Buy Groceries, Electronics, Fashion & More</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="app.js?v=2026_03_11_4"></script>

  <style>
    :root {
      --jiomart-blue: #008ecc;
      --jiomart-dark: #004b71;
      --jiomart-bg: #f5f5f5;
      --jiomart-text: #333333;
    }

    body {
      background-color: var(--jiomart-bg);
      font-family: 'Roboto', sans-serif;
      color: var(--jiomart-text);
    }

    @keyframes pulse-red {
      0% {
        box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.4);
      }

      70% {
        box-shadow: 0 0 0 10px rgba(220, 53, 69, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(220, 53, 69, 0);
      }
    }

    .animate-pulse {
      animation: pulse-red 2s infinite;
    }

    /* Header Styling */
    .top-header {
      background-color: white;
      padding: 15px 0;
      border-bottom: 1px solid #eee;
    }

    .brand-logo {
      font-size: 28px;
      font-weight: 900;
      color: var(--jiomart-blue) !important;
      text-decoration: none;
      letter-spacing: -1px;
    }

    .search-bar {
      border-radius: 8px;
      background-color: #f0f5f9;
      border: 1px solid transparent;
      padding: 10px 15px;
    }

    /* Category Nav */
    .cat-nav {
      background-color: var(--jiomart-blue);
      padding: 8px 0;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .cat-nav a {
      color: white !important;
      font-weight: 500;
      font-size: 14px;
      margin-right: 25px;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .cat-nav a:hover {
      opacity: 0.8;
    }

    /* Premium Component Styles */
    .card {
      transition: transform 0.2s, box-shadow 0.2s;
      border-radius: 12px;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08) !important;
    }

    .btn-primary {
      background-color: var(--jiomart-blue);
      border: none;
      border-radius: 8px;
    }

    .btn-primary:hover {
      background-color: var(--jiomart-dark);
    }

    .badge-rupee {
      font-weight: bold;
      color: var(--jiomart-blue);
    }
  </style>
</head>

<body ng-controller="MainController">

  <!-- Top Header -->
  <header class="top-header sticky-top">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-3">
          <a class="brand-logo" href="#!/">jio<span style="color: #ea503d;">mart</span></a>
        </div>
        <div class="col-md-6">
          <input type="text" class="form-control search-bar" placeholder="Search for products, categories..."
            ng-model="searchQuery" ng-keypress="onSearch($event)">
        </div>
        <div class="col-md-3 text-end d-flex align-items-center justify-content-end">
          <div ng-hide="isLoggedIn">
            <a href="#!/login" class="btn btn-link text-decoration-none fw-bold me-2"
              style="color: var(--jiomart-text);">Login</a>
            <a href="#!/signup" class="btn btn-primary px-4 fw-bold">Sign Up</a>
          </div>
          <div ng-show="isLoggedIn" class="d-flex align-items-center">
            <a href="#!/orders" class="btn btn-outline-primary fw-bold border-0 me-3">My Orders</a>
            <a href="#!/cart" class="btn btn-outline-primary border-0 me-3 position-relative">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-cart3"
                viewBox="0 0 16 16">
                <path
                  d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .49.598l-1 5a.5.5 0 0 1-.465.401l-9.397.472L4.415 11H13a.5.5 0 0 1 0 1H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5zM3.102 4l.84 4.479 9.144-.459L13.89 4H3.102zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2z" />
              </svg>
              <span
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-light"
                ng-show="cartCount > 0" style="font-size: 0.65em; padding: 0.35em 0.5em;" ng-cloak>
                {{cartCount}}
              </span>
            </a>
            <div class="dropdown">
              <button class="btn btn-light dropdown-toggle rounded-pill" type="button" data-bs-toggle="dropdown">
                {{currentUser.email.split('@')[0]}}
              </button>
              <ul class="dropdown-menu dropdown-menu-end border-0 shadow-sm mt-2">
                <li ng-show="isRole('seller') || isRole('admin')"><a class="dropdown-item py-2"
                    href="#!/seller/dashboard">My Shop / Seller Panel</a></li>
                <li ng-show="currentUser.role === 'admin'"><a class="dropdown-item py-2" href="#!/admin/dashboard">Admin
                    Dashboard</a></li>
                <li>
                  <hr class="dropdown-divider">
                </li>
                <li><button class="dropdown-item py-2 text-danger" ng-click="logout()">Logout</button></li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Category Nav Bar -->
  <nav class="cat-nav d-none d-md-block">
    <div class="container d-flex">
      <a href="#!/products">All Products</a>
      <a href="#!/products?category=Groceries">Groceries</a>
      <a href="#!/products?category=Electronics">Electronics</a>
      <a href="#!/products?category=Fashion">Fashion</a>
      <a href="#!/products?category=Home">Home & Kitchen</a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="py-4">
    <div ng-view class="fade-in"></div>
  </main>

  <footer class="bg-white border-top py-4 mt-5">
    <div class="container text-center">
      <p class="text-muted small">© 2026 JioMart. All rights reserved. Indian context marketplace demo.</p>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
