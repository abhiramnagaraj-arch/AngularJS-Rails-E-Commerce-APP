<!DOCTYPE html>
<html ng-app="marketplaceApp">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Commerce — Premium Multi-Vendor Marketplace</title>
  <meta name="description"
    content="Discover premium products from top sellers. Shop electronics, fashion, groceries & more on Cosmic Commerce.">

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- AngularJS Core + Animate -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-animate.min.js"></script>
  <!-- Razorpay -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <!-- VanillaTilt for 3D card effects -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>
  <!-- App -->
  <script src="app.js?v=2026_03_16_fix"></script>

  <style>
    /* =============================================
       COSMIC COMMERCE — DESIGN SYSTEM
       ============================================= */
    :root {
      --primary: #4F8EF7;
      --primary-glow: rgba(79, 142, 247, 0.35);
      --primary-gradient: linear-gradient(135deg, #4F8EF7, #9B6FFF);
      --accent-gold: #F5C842;
      --accent-violet: #9B6FFF;
      --accent-violet-glow: rgba(155, 111, 255, 0.3);
      --bg-base: #090E1A;
      --bg-surface: #0D1B2A;
      --bg-glass: rgba(13, 27, 42, 0.6);
      --bg-glass-solid: rgba(13, 27, 42, 0.85);
      --text-primary: #F0F4FF;
      --text-muted: #8A9BB8;
      --border-glow: rgba(79, 142, 247, 0.25);
      --border-subtle: rgba(255, 255, 255, 0.06);
      --success: #34D399;
      --danger: #F87171;
      --warning: #FBBF24;
      --radius-sm: 8px;
      --radius-md: 14px;
      --radius-lg: 20px;
      --radius-pill: 50px;
      --font-heading: 'Space Grotesk', 'Roboto', sans-serif;
      --font-body: 'Roboto', sans-serif;
      --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* =============================================
       RESET & BASE
       ============================================= */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      background: var(--bg-base);
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(79, 142, 247, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(155, 111, 255, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(79, 142, 247, 0.04) 0%, transparent 50%);
      font-family: var(--font-body);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6,
    .h1,
    .h2,
    .h3,
    .h4,
    .h5,
    .h6 {
      font-family: var(--font-heading);
      color: var(--text-primary);
      font-weight: 600;
    }

    p,
    span,
    div,
    td,
    th,
    label,
    li {
      color: var(--text-primary);
    }

    a {
      color: var(--primary);
      transition: color var(--transition-fast);
    }

    a:hover {
      color: #7AB0FF;
    }

    ::selection {
      background: var(--primary);
      color: white;
    }

    /* =============================================
       CUSTOM SCROLLBAR
       ============================================= */
    ::-webkit-scrollbar {
      width: 5px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-base);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #7AB0FF;
    }

    /* =============================================
       COSMIC PARTICLES BACKGROUND
       ============================================= */
    #cosmic-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: rgba(79, 142, 247, 0.4);
      border-radius: 50%;
      animation: drift linear infinite;
    }

    .particle:nth-child(odd) {
      background: rgba(155, 111, 255, 0.3);
      width: 3px;
      height: 3px;
    }

    .particle:nth-child(3n) {
      background: rgba(245, 200, 66, 0.2);
      width: 1.5px;
      height: 1.5px;
    }

    @keyframes drift {
      0% {
        transform: translateY(100vh) translateX(0);
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      90% {
        opacity: 1;
      }

      100% {
        transform: translateY(-10vh) translateX(30px);
        opacity: 0;
      }
    }

    /* =============================================
       NAVBAR — GLASSMORPHISM
       ============================================= */
    .top-header {
      background: var(--bg-glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-glow);
      box-shadow: 0 1px 30px rgba(79, 142, 247, 0.08);
      padding: 12px 0;
      position: sticky;
      top: 0;
      z-index: 1030;
      transition: background var(--transition-smooth), box-shadow var(--transition-smooth);
    }

    .top-header.scrolled {
      background: var(--bg-glass-solid);
      box-shadow: 0 4px 40px rgba(0, 0, 0, 0.4), 0 1px 20px rgba(79, 142, 247, 0.12);
    }

    .brand-logo {
      font-family: var(--font-heading);
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary) !important;
      text-decoration: none;
      letter-spacing: -1px;
      text-shadow: 0 0 20px var(--primary-glow);
      transition: text-shadow var(--transition-fast);
    }

    .brand-logo:hover {
      text-shadow: 0 0 30px var(--primary-glow), 0 0 60px rgba(79, 142, 247, 0.15);
    }

    .brand-logo span {
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Search Bar */
    .search-bar {
      border-radius: var(--radius-pill);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-subtle);
      padding: 10px 20px;
      color: var(--text-primary);
      backdrop-filter: blur(10px);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-fast);
    }

    .search-bar::placeholder {
      color: var(--text-muted);
    }

    .search-bar:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow), 0 0 20px rgba(79, 142, 247, 0.1);
      outline: none;
      color: var(--text-primary);
    }

    /* Nav Auth Buttons */
    .btn-link {
      color: var(--text-muted) !important;
      font-weight: 500;
      transition: color var(--transition-fast);
    }

    .btn-link:hover {
      color: var(--text-primary) !important;
    }

    /* Cart Icon */
    .nav-cart-icon {
      position: relative;
      color: var(--text-muted);
      transition: color var(--transition-fast);
    }

    .nav-cart-icon:hover {
      color: var(--primary);
    }

    .nav-cart-icon svg {
      fill: currentColor;
    }

    @keyframes cart-wobble {

      0%,
      100% {
        transform: rotate(0deg);
      }

      20% {
        transform: rotate(-12deg);
      }

      40% {
        transform: rotate(10deg);
      }

      60% {
        transform: rotate(-6deg);
      }

      80% {
        transform: rotate(4deg);
      }
    }

    .cart-wobble {
      animation: cart-wobble 0.6s ease;
    }

    /* Dropdown */
    .dropdown-toggle {
      background: rgba(255, 255, 255, 0.08) !important;
      border: 1px solid var(--border-subtle) !important;
      color: var(--text-primary) !important;
      backdrop-filter: blur(10px);
    }

    .dropdown-toggle:hover,
    .dropdown-toggle:focus {
      border-color: var(--border-glow) !important;
    }

    .dropdown-menu {
      background: var(--bg-surface) !important;
      border: 1px solid var(--border-glow) !important;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5) !important;
      backdrop-filter: blur(20px);
    }

    .dropdown-item {
      color: var(--text-muted) !important;
      transition: background var(--transition-fast), color var(--transition-fast);
    }

    .dropdown-item:hover,
    .dropdown-item:focus {
      background: rgba(79, 142, 247, 0.1) !important;
      color: var(--text-primary) !important;
    }

    .dropdown-item.text-danger {
      color: var(--danger) !important;
    }

    .dropdown-divider {
      border-color: var(--border-subtle) !important;
    }

    /* Nav Link Underline Effect */
    .nav-cosmic-link {
      position: relative;
      color: rgba(240, 244, 255, 0.7) !important;
      font-weight: 500;
      font-size: 14px;
      margin-right: 25px;
      text-decoration: none;
      transition: color var(--transition-fast);
      padding-bottom: 4px;
    }

    .nav-cosmic-link::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--primary-gradient);
      border-radius: 2px;
      transition: width var(--transition-smooth);
    }

    .nav-cosmic-link:hover {
      color: var(--text-primary) !important;
    }

    .nav-cosmic-link:hover::after {
      width: 100%;
    }

    /* =============================================
       CATEGORY NAV
       ============================================= */
    .cat-nav {
      background: rgba(13, 27, 42, 0.7);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 10px 0;
      border-bottom: 1px solid var(--border-subtle);
    }

    .cat-nav a {
      color: var(--text-muted) !important;
      font-weight: 500;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-right: 28px;
      text-decoration: none;
      transition: color var(--transition-fast);
      position: relative;
    }

    .cat-nav a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--primary);
      border-radius: 2px;
      transition: width var(--transition-smooth);
    }

    .cat-nav a:hover {
      color: var(--text-primary) !important;
    }

    .cat-nav a:hover::after {
      width: 100%;
    }

    /* =============================================
       GLOBAL CARD STYLES
       ============================================= */
    .card {
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-subtle) !important;
      border-radius: var(--radius-lg) !important;
      transition: transform var(--transition-smooth), box-shadow var(--transition-smooth), border-color var(--transition-smooth);
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), 0 0 30px rgba(79, 142, 247, 0.08) !important;
      border-color: var(--border-glow) !important;
    }

    .card-header,
    .card-footer {
      background: rgba(255, 255, 255, 0.03) !important;
      border-color: var(--border-subtle) !important;
    }

    .card-body {
      color: var(--text-primary);
    }

    /* =============================================
       GLOBAL BUTTON OVERRIDES
       ============================================= */
    .btn-primary {
      background: var(--primary-gradient) !important;
      border: none !important;
      border-radius: var(--radius-sm);
      color: white !important;
      font-weight: 600;
      position: relative;
      overflow: hidden;
      transition: box-shadow var(--transition-fast), transform var(--transition-fast);
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
      transition: left 0.5s ease;
    }

    .btn-primary:hover {
      box-shadow: 0 8px 30px var(--primary-glow), 0 0 15px rgba(79, 142, 247, 0.2);
      transform: translateY(-1px);
    }

    .btn-primary:hover::before {
      left: 100%;
    }

    .btn-primary:active {
      transform: scale(0.97) !important;
      box-shadow: 0 4px 15px var(--primary-glow);
    }

    .btn-outline-primary {
      color: var(--primary) !important;
      border-color: var(--primary) !important;
      background: transparent !important;
      transition: all var(--transition-fast);
    }

    .btn-outline-primary:hover {
      background: var(--primary-gradient) !important;
      color: white !important;
      border-color: transparent !important;
      box-shadow: 0 8px 25px var(--primary-glow);
    }

    .btn-outline-secondary {
      color: var(--text-muted) !important;
      border-color: var(--border-subtle) !important;
    }

    .btn-outline-secondary:hover {
      background: rgba(255, 255, 255, 0.05) !important;
      color: var(--text-primary) !important;
      border-color: var(--border-glow) !important;
    }

    .btn-outline-info {
      color: var(--primary) !important;
      border-color: rgba(79, 142, 247, 0.3) !important;
    }

    .btn-outline-info:hover {
      background: rgba(79, 142, 247, 0.1) !important;
      color: var(--text-primary) !important;
    }

    .btn-outline-danger {
      color: var(--danger) !important;
      border-color: rgba(248, 113, 113, 0.3) !important;
    }

    .btn-outline-danger:hover {
      background: rgba(248, 113, 113, 0.1) !important;
    }

    .btn-success {
      background: linear-gradient(135deg, #34D399, #10B981) !important;
      border: none !important;
      font-weight: 600;
    }

    .btn-success:hover {
      box-shadow: 0 8px 25px rgba(52, 211, 153, 0.35);
    }

    .btn-warning {
      background: linear-gradient(135deg, #FBBF24, #F59E0B) !important;
      border: none !important;
      color: #1a1a1a !important;
      font-weight: 600;
    }

    .btn-danger {
      background: linear-gradient(135deg, #F87171, #EF4444) !important;
      border: none !important;
      font-weight: 600;
    }

    .btn-dark {
      background: linear-gradient(135deg, #1E293B, #334155) !important;
      border: none !important;
      color: var(--text-primary) !important;
    }

    .btn-light {
      background: rgba(255, 255, 255, 0.06) !important;
      border: 1px solid var(--border-subtle) !important;
      color: var(--text-muted) !important;
    }

    .btn-light:hover {
      background: rgba(255, 255, 255, 0.1) !important;
      color: var(--text-primary) !important;
    }

    /* =============================================
       FORM CONTROLS
       ============================================= */
    .form-control,
    .form-select {
      background: rgba(255, 255, 255, 0.05) !important;
      border: 1px solid var(--border-subtle) !important;
      color: var(--text-primary) !important;
      border-radius: var(--radius-sm);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }

    .form-control::placeholder {
      color: var(--text-muted) !important;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: var(--primary) !important;
      box-shadow: 0 0 0 3px var(--primary-glow), 0 0 15px var(--primary-glow) !important;
      background: rgba(255, 255, 255, 0.08) !important;
    }

    .glass-select {
      background: rgba(13, 27, 42, 0.6) !important;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border-subtle) !important;
      color: var(--text-primary) !important;
      cursor: pointer;
    }

    .glass-select option {
      background-color: var(--bg-surface) !important;
      color: var(--text-primary) !important;
    }

    .form-label {
      color: var(--text-muted) !important;
      font-weight: 500;
    }

    .form-text {
      color: var(--text-muted) !important;
    }

    .form-check-input {
      background-color: rgba(255, 255, 255, 0.1) !important;
      border-color: var(--border-glow) !important;
    }

    .form-check-input:checked {
      background-color: var(--primary) !important;
      border-color: var(--primary) !important;
    }

    .form-check-label {
      color: var(--text-muted) !important;
    }

    /* =============================================
       TABLE DARK OVERRIDES
       ============================================= */
    .table {
      color: var(--text-primary);
      --bs-table-bg: transparent;
      --bs-table-hover-bg: rgba(79, 142, 247, 0.06);
      --bs-table-striped-bg: rgba(255, 255, 255, 0.02);
    }

    .table th {
      color: var(--text-muted) !important;
      font-weight: 600;
      border-color: var(--border-subtle) !important;
    }

    .table td {
      border-color: var(--border-subtle) !important;
      color: var(--text-primary);
    }

    .table thead {
      background: rgba(255, 255, 255, 0.03) !important;
    }

    .table-hover tbody tr:hover {
      background-color: rgba(79, 142, 247, 0.06) !important;
    }

    /* =============================================
       BADGES
       ============================================= */
    .badge {
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .bg-primary {
      background: var(--primary-gradient) !important;
    }

    .bg-success {
      background: linear-gradient(135deg, #34D399, #10B981) !important;
    }

    .bg-danger {
      background: linear-gradient(135deg, #F87171, #EF4444) !important;
    }

    .bg-warning {
      background: linear-gradient(135deg, #FBBF24, #F59E0B) !important;
      color: #1a1a1a !important;
    }

    .bg-secondary {
      background: rgba(255, 255, 255, 0.1) !important;
      color: var(--text-muted) !important;
    }

    .bg-info {
      background: linear-gradient(135deg, #38BDF8, #0EA5E9) !important;
    }

    .bg-light {
      background: rgba(255, 255, 255, 0.04) !important;
      color: var(--text-primary) !important;
    }

    .bg-dark {
      background: rgba(0, 0, 0, 0.3) !important;
      color: var(--text-primary) !important;
    }

    .bg-white {
      background: rgba(255, 255, 255, 0.03) !important;
    }

    .text-bg-secondary {
      background: rgba(155, 111, 255, 0.15) !important;
      color: var(--accent-violet) !important;
    }

    /* Subtle badges */
    .bg-primary-subtle {
      background: rgba(79, 142, 247, 0.12) !important;
      color: var(--primary) !important;
    }

    .bg-success-subtle {
      background: rgba(52, 211, 153, 0.12) !important;
      color: var(--success) !important;
    }

    .bg-danger-subtle {
      background: rgba(248, 113, 113, 0.12) !important;
      color: var(--danger) !important;
    }

    .bg-secondary-subtle {
      background: rgba(255, 255, 255, 0.06) !important;
      color: var(--text-muted) !important;
    }

    .bg-warning-subtle {
      background: rgba(251, 191, 36, 0.12) !important;
    }

    /* =============================================
       TYPOGRAPHY COLOR OVERRIDES
       ============================================= */
    .text-dark {
      color: var(--text-primary) !important;
    }

    .text-muted {
      color: var(--text-muted) !important;
    }

    .text-primary {
      color: var(--primary) !important;
    }

    .text-success {
      color: var(--success) !important;
    }

    .text-danger {
      color: var(--danger) !important;
    }

    .text-warning {
      color: var(--accent-gold) !important;
    }

    .text-info {
      color: #38BDF8 !important;
    }

    .text-white {
      color: var(--text-primary) !important;
    }

    /* =============================================
       ALERTS
       ============================================= */
    .alert {
      background: var(--bg-glass) !important;
      border: 1px solid var(--border-subtle) !important;
      color: var(--text-primary) !important;
      backdrop-filter: blur(12px);
    }

    .alert-warning {
      border-left: 4px solid var(--accent-gold) !important;
    }

    .alert-danger {
      border-left: 4px solid var(--danger) !important;
    }

    .alert-info {
      border-left: 4px solid var(--primary) !important;
    }

    .alert-light {
      background: rgba(255, 255, 255, 0.03) !important;
      border: 1px solid var(--border-subtle) !important;
    }

    .alert-heading {
      color: var(--text-primary) !important;
    }

    /* =============================================
       MISC BOOTSTRAP OVERRIDES
       ============================================= */
    .shadow-sm {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2) !important;
    }

    .shadow {
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.3) !important;
    }

    .shadow-lg {
      box-shadow: 0 15px 60px rgba(0, 0, 0, 0.4) !important;
    }

    .border {
      border-color: var(--border-subtle) !important;
    }

    .border-bottom {
      border-color: var(--border-subtle) !important;
    }

    .border-top {
      border-color: var(--border-subtle) !important;
    }

    .border-end {
      border-color: var(--border-subtle) !important;
    }

    .border-start {
      border-color: var(--border-subtle) !important;
    }

    .border-primary {
      border-color: var(--primary) !important;
    }

    .border-danger {
      border-color: var(--danger) !important;
    }

    .border-success {
      border-color: var(--success) !important;
    }

    .border-info {
      border-color: #38BDF8 !important;
    }

    hr {
      border-color: var(--border-subtle) !important;
      opacity: 1;
    }

    .breadcrumb-item a {
      color: var(--primary) !important;
    }

    .breadcrumb-item.active {
      color: var(--text-muted) !important;
    }

    .input-group-text {
      background: rgba(255, 255, 255, 0.03) !important;
      border-color: var(--border-subtle) !important;
      color: var(--text-muted) !important;
    }

    /* =============================================
       PRICE & PRODUCT SPECIFIC
       ============================================= */
    .price-tag {
      font-family: var(--font-heading);
      color: var(--accent-gold);
      font-weight: 700;
    }

    .badge-rupee {
      font-weight: bold;
      color: var(--accent-gold);
    }

    /* Product Card */
    .product-card {
      background: var(--bg-glass) !important;
      border: 1px solid var(--border-subtle) !important;
      border-radius: var(--radius-lg) !important;
      transition: transform var(--transition-smooth), box-shadow var(--transition-smooth), border-color var(--transition-smooth);
    }

    .product-card:hover {
      border-color: var(--border-glow) !important;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), 0 0 40px rgba(79, 142, 247, 0.1) !important;
    }

    .product-card img {
      transition: transform var(--transition-smooth);
    }

    .product-card:hover img {
      transform: scale(1.05);
    }

    /* =============================================
       PAGE TRANSITIONS (ngAnimate)
       ============================================= */
    [ng-view].ng-enter {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    [ng-view].ng-enter-active {
      opacity: 1;
      transform: translateY(0);
    }

    [ng-view].ng-leave {
      opacity: 1;
      transition: opacity 0.2s ease;
    }

    [ng-view].ng-leave-active {
      opacity: 0;
    }

    /* =============================================
       SCROLL ANIMATIONS
       ============================================= */
    .animate-on-scroll {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .animate-on-scroll.is-visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Stagger children */
    .stagger-children .animate-on-scroll:nth-child(1) {
      transition-delay: 0s;
    }

    .stagger-children .animate-on-scroll:nth-child(2) {
      transition-delay: 0.08s;
    }

    .stagger-children .animate-on-scroll:nth-child(3) {
      transition-delay: 0.16s;
    }

    .stagger-children .animate-on-scroll:nth-child(4) {
      transition-delay: 0.24s;
    }

    .stagger-children .animate-on-scroll:nth-child(5) {
      transition-delay: 0.32s;
    }

    .stagger-children .animate-on-scroll:nth-child(6) {
      transition-delay: 0.4s;
    }

    .stagger-children .animate-on-scroll:nth-child(7) {
      transition-delay: 0.48s;
    }

    .stagger-children .animate-on-scroll:nth-child(8) {
      transition-delay: 0.56s;
    }

    /* =============================================
       PULSING GLOW ANIMATION
       ============================================= */
    @keyframes pulse-glow {

      0%,
      100% {
        box-shadow: 0 0 20px var(--primary-glow);
      }

      50% {
        box-shadow: 0 0 40px var(--primary-glow), 0 0 60px rgba(79, 142, 247, 0.15);
      }
    }

    .pulse-glow {
      animation: pulse-glow 2s ease-in-out infinite;
    }

    @keyframes pulse-red {
      0% {
        box-shadow: 0 0 0 0 rgba(248, 113, 113, 0.4);
      }

      70% {
        box-shadow: 0 0 0 10px rgba(248, 113, 113, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(248, 113, 113, 0);
      }
    }

    .animate-pulse {
      animation: pulse-red 2s infinite;
    }

    /* =============================================
       FOOTER
       ============================================= */
    .cosmic-footer {
      background: var(--bg-glass);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-top: 1px solid var(--border-glow);
      padding: 24px 0;
      margin-top: 60px;
    }

    .cosmic-footer p {
      color: var(--text-muted);
      font-size: 13px;
      margin: 0;
    }

    .cosmic-footer .footer-brand {
      font-family: var(--font-heading);
      font-weight: 700;
      color: var(--text-primary);
      text-shadow: 0 0 15px var(--primary-glow);
    }

    .cosmic-footer .footer-brand span {
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* =============================================
       ACCESSIBILITY: REDUCED MOTION
       ============================================= */
    @media (prefers-reduced-motion: reduce) {

      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }

      .particle {
        display: none;
      }

      .animate-on-scroll {
        opacity: 1;
        transform: none;
      }

      [ng-view].ng-enter,
      [ng-view].ng-leave {
        transition: none;
      }
    }

    /* =============================================
       RESPONSIVE TWEAKS
       ============================================= */
    @media (max-width: 768px) {
      .top-header {
        padding: 10px 0;
      }

      .brand-logo {
        font-size: 22px;
      }

      .search-bar {
        font-size: 14px;
        padding: 8px 14px;
      }

      .card:hover {
        transform: none;
      }

      .particle:nth-child(n+30) {
        display: none;
      }
    }

    /* =============================================
       NG-CLOAK
       ============================================= */
    [ng-cloak] {
      display: none !important;
    }

    /* Spinner override */
    .spinner-border {
      border-color: rgba(255, 255, 255, 0.2);
      border-right-color: var(--text-primary);
    }

    /* =============================================
       MODAL / MISC
       ============================================= */
    .btn-close {
      filter: invert(1) grayscale(100%) brightness(200%);
    }

    .list-group-item {
      background: transparent !important;
      border-color: var(--border-subtle) !important;
      color: var(--text-primary);
    }

    /* Image placeholder bg */
    .img-placeholder-bg {
      background: rgba(255, 255, 255, 0.03) !important;
    }

    /* =============================================
       HERO SECTION
       ============================================= */
    .cosmic-hero {
      position: relative;
      min-height: 92vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      padding: 60px 20px 40px;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 800px;
    }

    /* 3D Rotating Rings */
    .hero-ring-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 500px;
      pointer-events: none;
    }

    .hero-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      border: 1.5px solid rgba(79, 142, 247, 0.15);
      border-radius: 50%;
      transform-style: preserve-3d;
    }

    .hero-ring-1 {
      animation: ring-rotate-1 12s linear infinite;
      transform: translate(-50%, -50%) rotateX(65deg) rotateZ(0deg);
    }

    .hero-ring-2 {
      border-color: rgba(155, 111, 255, 0.12);
      animation: ring-rotate-2 16s linear infinite;
      transform: translate(-50%, -50%) rotateX(65deg) rotateZ(60deg);
      width: 85%;
      height: 85%;
    }

    @keyframes ring-rotate-1 {
      0% {
        transform: translate(-50%, -50%) rotateX(65deg) rotateZ(0deg);
      }

      100% {
        transform: translate(-50%, -50%) rotateX(65deg) rotateZ(360deg);
      }
    }

    @keyframes ring-rotate-2 {
      0% {
        transform: translate(-50%, -50%) rotateX(65deg) rotateZ(60deg);
      }

      100% {
        transform: translate(-50%, -50%) rotateX(65deg) rotateZ(420deg);
      }
    }

    /* Floating Offer Pills */
    .hero-pills {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .offer-pill {
      position: absolute;
      background: var(--bg-glass);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-subtle);
      padding: 6px 16px;
      border-radius: var(--radius-pill);
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      white-space: nowrap;
      animation: pill-float 6s ease-in-out infinite;
    }

    .offer-pill-1 {
      top: 10%;
      left: 5%;
      animation-delay: 0s;
    }

    .offer-pill-2 {
      top: 25%;
      right: 8%;
      animation-delay: 1.2s;
    }

    .offer-pill-3 {
      bottom: 30%;
      left: 2%;
      animation-delay: 2.4s;
    }

    .offer-pill-4 {
      top: 15%;
      right: 3%;
      animation-delay: 3.6s;
    }

    .offer-pill-5 {
      bottom: 15%;
      right: 10%;
      animation-delay: 4.8s;
    }

    @keyframes pill-float {

      0%,
      100% {
        transform: translateY(0) scale(1);
        opacity: 0.6;
      }

      50% {
        transform: translateY(-15px) scale(1.03);
        opacity: 1;
      }
    }

    /* Hero Text */
    .hero-eyebrow {
      font-family: var(--font-heading);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 20px;
    }

    .hero-title {
      font-family: var(--font-heading);
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      font-weight: 700;
      line-height: 1.1;
      color: var(--text-primary);
      margin-bottom: 24px;
    }

    .hero-title-gradient {
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: 1.1rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 36px;
    }

    /* Hero CTA */
    .hero-cta-group {
      display: flex;
      gap: 16px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .hero-cta-primary {
      border-radius: var(--radius-pill) !important;
      padding: 14px 36px !important;
      font-size: 1.05rem !important;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: all var(--transition-smooth);
    }

    .hero-cta-arrow {
      display: inline-block;
      transition: transform var(--transition-fast);
    }

    .hero-cta-primary:hover .hero-cta-arrow {
      transform: translateX(5px);
    }

    .hero-cta-secondary {
      padding: 14px 32px !important;
      font-size: 1.05rem !important;
    }

    /* Hero Stats */
    .hero-stats {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      margin-top: 60px;
      padding-top: 30px;
      border-top: 1px solid var(--border-subtle);
    }

    .hero-stat {
      text-align: center;
    }

    .hero-stat-number {
      font-family: var(--font-heading);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--text-primary);
      display: block;
    }

    .hero-stat-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 500;
    }

    .hero-stat-divider {
      width: 1px;
      height: 40px;
      background: var(--border-subtle);
    }

    /* Scroll Indicator */
    .scroll-indicator {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 40px;
      border: 2px solid var(--border-glow);
      border-radius: 12px;
      display: flex;
      justify-content: center;
      padding-top: 6px;
    }

    .scroll-indicator-dot {
      width: 4px;
      height: 8px;
      background: var(--primary);
      border-radius: 4px;
      animation: scroll-dot 1.5s ease-in-out infinite;
    }

    @keyframes scroll-dot {

      0%,
      100% {
        transform: translateY(0);
        opacity: 1;
      }

      50% {
        transform: translateY(12px);
        opacity: 0.3;
      }
    }

    /* =============================================
       SECTION HEADERS
       ============================================= */
    .section-header {
      margin-bottom: 32px;
    }

    .section-eyebrow {
      font-family: var(--font-heading);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .section-title {
      font-family: var(--font-heading);
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    /* =============================================
       CATEGORY CARDS
       ============================================= */
    .category-scroll-row {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding-bottom: 16px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .category-scroll-row::-webkit-scrollbar {
      display: none;
    }

    .category-card {
      flex: 0 0 auto;
      width: 140px;
      padding: 24px 16px;
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      text-decoration: none;
      text-align: center;
      transition: transform var(--transition-smooth), border-color var(--transition-smooth), box-shadow var(--transition-smooth);
    }

    .category-card:hover {
      transform: translateY(-8px);
      border-color: var(--accent-gold);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3), 0 0 25px rgba(245, 200, 66, 0.1);
    }

    .category-icon {
      font-size: 2.2rem;
      margin-bottom: 10px;
      transition: transform var(--transition-smooth);
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
    }

    .category-card:hover .category-icon {
      transform: scale(1.15);
    }

    .category-name {
      font-family: var(--font-heading);
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      display: block;
    }

    .category-card:hover .category-name {
      color: var(--text-primary);
    }

    /* =============================================
       FEATURE CARDS
       ============================================= */
    .feature-card {
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 32px 24px;
      text-align: center;
      height: 100%;
      transition: transform var(--transition-smooth), border-color var(--transition-smooth), box-shadow var(--transition-smooth);
    }

    .feature-card:hover {
      transform: translateY(-6px);
      border-color: var(--border-glow);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3), 0 0 30px rgba(79, 142, 247, 0.08);
    }

    .feature-icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
    }

    .feature-title {
      font-family: var(--font-heading);
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 10px;
    }

    .feature-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* Hero Responsive */
    @media (max-width: 768px) {
      .cosmic-hero {
        min-height: 80vh;
        padding: 40px 16px 30px;
      }

      .hero-ring-container {
        width: 300px;
        height: 300px;
      }

      .offer-pill {
        display: none;
      }

      .hero-stats {
        gap: 16px;
        margin-top: 40px;
      }

      .hero-stat-number {
        font-size: 1.4rem;
      }

      .category-card {
        width: 120px;
        padding: 20px 12px;
      }

      .scroll-indicator {
        display: none;
      }
    }
    /* Sidebar Styles */
    .admin-sidebar {
        position: fixed;
        left: 0;
        top: 80px;
        bottom: 0;
        width: 260px;
        background: rgba(10, 14, 20, 0.8) !important;
        backdrop-filter: blur(30px) !important;
        border-right: 1px solid rgba(79, 142, 247, 0.2) !important;
        z-index: 1000;
        padding-top: 2rem;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .admin-main-content {
        margin-left: 260px;
        padding-left: 2rem;
        padding-right: 2rem;
    }

    .nav-link-glass {
        background: transparent;
        border: 1px solid transparent;
        color: rgba(255, 255, 255, 0.6);
        padding: 12px 20px;
        border-radius: 12px;
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        transition: all 0.3s ease;
        text-transform: uppercase;
        width: 100%;
        text-align: left;
        display: flex;
        align-items: center;
    }

    .nav-link-glass:hover {
        background: rgba(79, 142, 247, 0.1);
        color: var(--primary);
        border-color: rgba(79, 142, 247, 0.2);
        transform: translateX(5px);
    }

    .nav-link-glass i {
        font-size: 1.1rem;
    }

    @media (max-width: 991px) {
        .admin-sidebar {
            display: none !important;
        }
        .admin-main-content {
            margin-left: 0;
            padding-left: 0;
            padding-right: 0;
        }
    }
  </style>
</head>

<body ng-controller="MainController">

  <!-- Cosmic Particles Background -->
  <div id="cosmic-particles"></div>

  <!-- Top Header -->
  <header class="top-header" id="cosmic-navbar">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-3">
          <a class="brand-logo" href="#!/">Cosmic<span>Commerce</span></a>
        </div>
        <div class="col-md-6">
          <input type="text" class="form-control search-bar" placeholder="Search for products, categories..."
            ng-model="searchQuery" ng-keypress="onSearch($event)">
        </div>
        <div class="col-md-3 text-end d-flex align-items-center justify-content-end">
          <div ng-hide="isLoggedIn">
            <a href="#!/login" class="btn btn-link text-decoration-none fw-bold me-2">Login</a>
            <a href="#!/signup" class="btn btn-primary px-4 fw-bold rounded-pill">Sign Up</a>
          </div>
          <div ng-show="isLoggedIn" class="d-flex align-items-center">
            <a href="#!/orders" class="btn btn-outline-primary fw-bold border-0 me-3 rounded-pill">My Orders</a>
            <a href="#!/cart" class="btn btn-outline-primary border-0 me-3 position-relative nav-cart-icon"
              id="cart-icon-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-cart3"
                viewBox="0 0 16 16">
                <path
                  d="M0 1.5A.5.5 0 0 1 .5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .49.598l-1 5a.5.5 0 0 1-.465.401l-9.397.472L4.415 11H13a.5.5 0 0 1 0 1H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5zM3.102 4l.84 4.479 9.144-.459L13.89 4H3.102zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2z" />
              </svg>
              <span
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-light"
                ng-show="cartCount > 0" style="font-size: 0.65em; padding: 0.35em 0.5em;" ng-cloak id="cart-badge">
                {{cartCount}}
              </span>
            </a>
            <div class="dropdown">
              <button class="btn dropdown-toggle rounded-pill" type="button" data-bs-toggle="dropdown">
                {{currentUser.email.split('@')[0]}}
              </button>
              <ul class="dropdown-menu dropdown-menu-end mt-2">
                <li ng-show="isRole('seller') || isRole('admin')"><a class="dropdown-item py-2"
                    href="#!/seller/dashboard">My Shop / Seller Panel</a></li>
                <li ng-show="currentUser.role === 'admin'"><a class="dropdown-item py-2" href="#!/admin/dashboard">Admin
                    Dashboard</a></li>
                <li>
                  <hr class="dropdown-divider">
                </li>
                <li><button class="dropdown-item py-2 text-danger" ng-click="logout()">Logout</button></li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Category Nav Bar -->
  <nav class="cat-nav d-none d-md-block">
    <div class="container d-flex">
      <a href="#!/products" class="nav-cosmic-link">All Products</a>
      <a href="#!/products?category=Groceries" class="nav-cosmic-link">Groceries</a>
      <a href="#!/products?category=Electronics" class="nav-cosmic-link">Electronics</a>
      <a href="#!/products?category=Fashion" class="nav-cosmic-link">Fashion</a>
      <a href="#!/products?category=Home" class="nav-cosmic-link">Home & Kitchen</a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="py-4" style="position: relative; z-index: 1;">
    <div ng-view></div>
  </main>

  <!-- Footer -->
  <footer class="cosmic-footer">
    <div class="container">
      <div class="row align-items-center">
        <div class="col-md-6">
          <span class="footer-brand">Cosmic<span>Commerce</span></span>
          <p class="mt-2">Premium multi-vendor marketplace experience.</p>
        </div>
        <div class="col-md-6 text-end">
          <p>© 2026 Cosmic Commerce. All rights reserved.</p>
        </div>
      </div>
    </div>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Cosmic Animation Engine -->
  <script>
    (function () {
      'use strict';

      // ========================================
      // 1. GENERATE PARTICLES
      // ========================================
      const particleContainer = document.getElementById('cosmic-particles');
      if (particleContainer) {
        const particleCount = window.innerWidth < 768 ? 25 : 55;
        const fragment = document.createDocumentFragment();
        for (let i = 0; i < particleCount; i++) {
          const p = document.createElement('div');
          p.className = 'particle';
          p.style.left = Math.random() * 100 + '%';
          p.style.animationDuration = (15 + Math.random() * 25) + 's';
          p.style.animationDelay = (Math.random() * 20) + 's';
          p.style.opacity = (0.2 + Math.random() * 0.5);
          fragment.appendChild(p);
        }
        particleContainer.appendChild(fragment);
      }

      // ========================================
      // 2. NAVBAR SCROLL DETECTION
      // ========================================
      const navbar = document.getElementById('cosmic-navbar');
      let ticking = false;

      function onScroll() {
        if (!ticking) {
          window.requestAnimationFrame(function () {
            if (window.scrollY > 80) {
              navbar.classList.add('scrolled');
            } else {
              navbar.classList.remove('scrolled');
            }
            ticking = false;
          });
          ticking = true;
        }
      }

      window.addEventListener('scroll', onScroll, { passive: true });

      // ========================================
      // 3. INTERSECTION OBSERVER FOR SCROLL ANIMATIONS
      // ========================================
      function initScrollAnimations() {
        if (!('IntersectionObserver' in window)) return;

        const observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('is-visible');
              observer.unobserve(entry.target);
            }
          });
        }, {
          threshold: 0.1,
          rootMargin: '0px 0px -50px 0px'
        });

        const observeElements = () => {
          document.querySelectorAll('.animate-on-scroll:not(.is-visible)').forEach(function (el) {
            observer.observe(el);
          });
        };

        observeElements();

        // Use MutationObserver to detect new elements added by Angular
        const domObserver = new MutationObserver(function (mutations) {
          observeElements();
        });

        domObserver.observe(document.body, {
          childList: true,
          subtree: true
        });
      }

      // ========================================
      // 4. VANILLA TILT INITIALIZATION
      // ========================================
      function initVanillaTilt() {
        if (typeof VanillaTilt === 'undefined' || window.innerWidth < 768) return;

        const tiltElements = document.querySelectorAll('[data-tilt]');
        tiltElements.forEach(function (el) {
          if (el._vanillaTiltInstance) return; // Already initialized
          VanillaTilt.init(el, {
            max: 8,
            speed: 400,
            glare: true,
            'max-glare': 0.15,
            scale: 1.02
          });
          el._vanillaTiltInstance = true;
        });
      }

      // ========================================
      // 5. CART WOBBLE on badge change
      // ========================================
      function initCartWobble() {
        const badge = document.getElementById('cart-badge');
        const cartBtn = document.getElementById('cart-icon-btn');
        if (!badge || !cartBtn) return;

        const mo = new MutationObserver(function () {
          cartBtn.classList.add('cart-wobble');
          setTimeout(function () {
            cartBtn.classList.remove('cart-wobble');
          }, 600);
        });

        mo.observe(badge, { childList: true, characterData: true, subtree: true });
      }

      // ========================================
      // 6. RE-INITIALIZE ON VIEW CHANGE
      // ========================================
      // Use AngularJS hook to re-init effects after each route change
      function hookIntoAngular() {
        try {
          const appEl = document.querySelector('[ng-app]');
          if (!appEl) return;
          const injector = angular.element(appEl).injector();
          if (!injector) return;
          const $rootScope = injector.get('$rootScope');

          $rootScope.$on('$viewContentLoaded', function () {
            setTimeout(function () {
              initScrollAnimations();
              initVanillaTilt();
              initCartWobble();
              initMagneticButton();
            }, 100);
          });
        } catch (e) {
          // Angular not ready yet, retry
          setTimeout(hookIntoAngular, 500);
        }
      }

      // ========================================
      // 7. MAGNETIC CTA BUTTON
      // ========================================
      function initMagneticButton() {
        const btn = document.getElementById('hero-magnetic-btn');
        if (!btn || window.innerWidth < 768) return;

        btn.addEventListener('mousemove', function (e) {
          const rect = btn.getBoundingClientRect();
          const x = e.clientX - rect.left - rect.width / 2;
          const y = e.clientY - rect.top - rect.height / 2;
          btn.style.transform = 'translate(' + (x * 0.15) + 'px, ' + (y * 0.15) + 'px)';
        });

        btn.addEventListener('mouseleave', function () {
          btn.style.transform = 'translate(0, 0)';
          btn.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
        });

        btn.addEventListener('mouseenter', function () {
          btn.style.transition = 'transform 0.1s ease';
        });
      }

      // ========================================
      // BOOT
      // ========================================
      document.addEventListener('DOMContentLoaded', function () {
        initScrollAnimations();
        initCartWobble();
        initMagneticButton();
        setTimeout(hookIntoAngular, 500);
      });
    })();
  </script>
</body>

</html>
