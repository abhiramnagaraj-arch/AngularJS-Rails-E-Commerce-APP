<!DOCTYPE html>
<html ng-app="marketplaceApp">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cosmic Commerce — Premium Multi-Vendor Marketplace</title>
  <meta name="description"
    content="Discover premium products from top sellers. Shop electronics, fashion, groceries & more on Cosmic Commerce.">

  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Modular CSS -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/views/home.css">
  <link rel="stylesheet" href="css/views/products.css">
  <link rel="stylesheet" href="css/views/admin.css">

  <!-- AngularJS Core + Animate -->
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-animate.min.js"></script>
  
  <!-- External Tools -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.0/vanilla-tilt.min.js"></script>

  <!-- Modular JS Application -->
  <script src="js/app.js?v=2026_03_17_v1"></script>
  <script src="js/constants.js"></script>
  <script src="js/services/auth-service.js"></script>
  <script src="js/services/cart-service.js"></script>
  <script src="js/directives/file-model.js"></script>
  <script src="js/controllers/main-controller.js"></script>
  <script src="js/controllers/auth-controllers.js"></script>
  <script src="js/controllers/product-controllers.js"></script>
  <script src="js/controllers/cart-controller.js"></script>
  <script src="js/controllers/orders-controller.js"></script>
  <script src="js/controllers/seller-controller.js"></script>
  <script src="js/controllers/admin-controller.js"></script>
</head>

<body ng-controller="MainController" ng-cloak>

  <!-- Cosmic Particles Background -->
  <div id="cosmic-particles"></div>

  <!-- Included Navbar -->
  <div ng-include="'views/layout/navbar.html'"></div>

  <!-- Main View Content -->
  <main class="py-4" style="position: relative; z-index: 1;">
    <div ng-view></div>
  </main>

  <!-- Included Footer -->
  <div ng-include="'views/layout/footer.html'"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Cosmic Animation Engine (Core UI Logic) -->
  <script>
    (function () {
      'use strict';

      // 1. GENERATE PARTICLES
      const particleContainer = document.getElementById('cosmic-particles');
      if (particleContainer) {
        const particleCount = window.innerWidth < 768 ? 25 : 55;
        const fragment = document.createDocumentFragment();
        for (let i = 0; i < particleCount; i++) {
          const p = document.createElement('div');
          p.className = 'particle';
          p.style.left = Math.random() * 100 + '%';
          p.style.animationDuration = (15 + Math.random() * 25) + 's';
          p.style.animationDelay = (Math.random() * 20) + 's';
          p.style.opacity = (0.2 + Math.random() * 0.5);
          fragment.appendChild(p);
        }
        particleContainer.appendChild(fragment);
      }

      // 2. NAVBAR SCROLL DETECTION
      const checkNavbar = () => {
        const navbar = document.getElementById('cosmic-navbar');
        if (navbar) {
          if (window.scrollY > 80) navbar.classList.add('scrolled');
          else navbar.classList.remove('scrolled');
        }
      };
      window.addEventListener('scroll', checkNavbar, { passive: true });

      // 3. INTERSECTION OBSERVER FOR SCROLL ANIMATIONS
      function initScrollAnimations() {
        if (!('IntersectionObserver' in window)) return;
        const observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('is-visible');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

        const observeElements = () => {
          document.querySelectorAll('.animate-on-scroll:not(.is-visible)').forEach(el => observer.observe(el));
        };
        observeElements();
        const domObserver = new MutationObserver(() => observeElements());
        domObserver.observe(document.body, { childList: true, subtree: true });
      }

      // 4. VANILLA TILT INITIALIZATION
      function initVanillaTilt() {
        if (typeof VanillaTilt === 'undefined' || window.innerWidth < 768) return;
        document.querySelectorAll('[data-tilt]').forEach(el => {
          if (el._vanillaTiltInstance) return;
          VanillaTilt.init(el, { max: 8, speed: 400, glare: true, 'max-glare': 0.15, scale: 1.02 });
          el._vanillaTiltInstance = true;
        });
      }

      // 5. CART WOBBLE
      function initCartWobble() {
        const badge = document.getElementById('cart-badge');
        const cartBtn = document.getElementById('cart-icon-btn');
        if (!badge || !cartBtn) return;
        new MutationObserver(() => {
          cartBtn.classList.add('cart-wobble');
          setTimeout(() => cartBtn.classList.remove('cart-wobble'), 600);
        }).observe(badge, { childList: true, characterData: true, subtree: true });
      }

      // 6. ANGULAR HOOKS
      function hookIntoAngular() {
        try {
          const appEl = document.querySelector('[ng-app]');
          if (!appEl) return;
          const injector = angular.element(appEl).injector();
          if (!injector) return;
          injector.get('$rootScope').$on('$viewContentLoaded', () => {
            setTimeout(() => {
              initScrollAnimations();
              initVanillaTilt();
              initCartWobble();
              initMagneticButton();
            }, 150);
          });
        } catch (e) {
          setTimeout(hookIntoAngular, 500);
        }
      }

      // 7. MAGNETIC CTA BUTTON
      function initMagneticButton() {
        const btn = document.getElementById('hero-magnetic-btn');
        if (!btn || window.innerWidth < 768) return;
        btn.addEventListener('mousemove', e => {
          const rect = btn.getBoundingClientRect();
          const x = e.clientX - rect.left - rect.width / 2;
          const y = e.clientY - rect.top - rect.height / 2;
          btn.style.transform = `translate(${x * 0.15}px, ${y * 0.15}px)`;
        });
        btn.addEventListener('mouseleave', () => {
          btn.style.transform = 'translate(0, 0)';
          btn.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
        });
        btn.addEventListener('mouseenter', () => {
          btn.style.transition = 'transform 0.1s ease';
        });
      }

      document.addEventListener('DOMContentLoaded', () => {
        initScrollAnimations();
        initCartWobble();
        initMagneticButton();
        setTimeout(hookIntoAngular, 500);
      });
    })();
  </script>
</body>

</html>
