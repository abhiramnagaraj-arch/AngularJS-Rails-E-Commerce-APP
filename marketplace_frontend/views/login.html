<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5 card border-0 shadow-lg p-4 rounded-4" style="background: white;">
            <div class="text-center mb-4">
                <h2 style="color: #008ecc; font-weight: 800;">Welcome to JioMart</h2>
                <p class="text-muted">Select your role to continue</p>
            </div>

            <!-- Role Selection Buttons -->
            <div class="d-grid gap-3 mb-4">
                <button class="btn btn-outline-primary py-3 rounded-pill fw-bold border-2"
                    ng-class="{'btn-primary text-white shadow-sm': credentials.role === 'buyer'}"
                    ng-click="setRole('buyer')">
                    Login as Buyer
                </button>
                <div class="row g-2">
                    <div class="col-6">
                        <button class="btn btn-outline-info w-100 py-2 rounded-pill fw-bold border-2"
                            ng-class="{'btn-info text-white shadow-sm': credentials.role === 'seller'}"
                            ng-click="setRole('seller')">
                            Seller
                        </button>
                    </div>
                    <div class="col-6">
                        <button class="btn btn-outline-dark w-100 py-2 rounded-pill fw-bold border-2"
                            ng-class="{'btn-dark text-white shadow-sm': credentials.role === 'admin'}"
                            ng-click="setRole('admin')">
                            Admin
                        </button>
                    </div>
                </div>
            </div>

            <form ng-submit="login()" ng-show="credentials.role">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email Address</label>
                    <input type="email" class="form-control rounded-3" ng-model="credentials.email"
                        placeholder="name@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" class="form-control rounded-3" ng-model="credentials.password"
                        placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold text-uppercase rounded-pill"
                    style="background-color: #008ecc; border: none;">
                    Login as {{credentials.role | uppercase}}
                </button>
            </form>

            <div class="mt-4 text-center">
                New to JioMart? <a href="#!/signup"
                    style="color: #008ecc; text-decoration: none; font-weight: bold;">Create Account</a>
            </div>
        </div>
    </div>
</div>
