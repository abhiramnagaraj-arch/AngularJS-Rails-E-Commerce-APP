<div class="auth-wrapper d-flex align-items-center justify-content-center">
    <!-- Background Blobs -->
    <div class="auth-blob blob-1"></div>
    <div class="auth-blob blob-2" style="background: #0dcaf0;"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card bg-glass border-glow p-4 p-md-5 rounded-4 auth-card animate-on-scroll">
                    <div class="text-center mb-5">
                        <div class="auth-icon-circle mb-3 mx-auto" style="color: #0dcaf0;">
                            <i class="bi bi-person-plus fs-2"></i>
                        </div>
                        <h2 class="hero-title-gradient fw-bold mb-2">Create Registry</h2>
                        <p class="text-muted small text-uppercase letter-spacing-2">Join the Cosmic Marketplace</p>
                    </div>

                    <form ng-submit="signup()" class="stagger-children">
                        <div class="mb-4 animate-on-scroll">
                            <label class="form-label x-small fw-bold text-muted text-uppercase mb-2">Universal Email</label>
                            <div class="input-group-glass">
                                <input type="email" class="form-control" ng-model="user.email" 
                                    placeholder="explorer@galaxy.net" required>
                                <div class="input-glow" style="box-shadow: 0 0 15px rgba(13, 202, 240, 0.2);"></div>
                            </div>
                        </div>

                        <div class="row g-3 mb-4">
                            <div class="col-md-6 animate-on-scroll">
                                <label class="form-label x-small fw-bold text-muted text-uppercase mb-2">Security Key</label>
                                <div class="input-group-glass">
                                    <input type="password" class="form-control" ng-model="user.password" 
                                        placeholder="••••••••" required>
                                    <div class="input-glow"></div>
                                </div>
                            </div>
                            <div class="col-md-6 animate-on-scroll">
                                <label class="form-label x-small fw-bold text-muted text-uppercase mb-2">Confirm Key</label>
                                <div class="input-group-glass">
                                    <input type="password" class="form-control" ng-model="user.password_confirmation" 
                                        placeholder="••••••••" required>
                                    <div class="input-glow"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Special Dimension Access (Seller Toggle) -->
                        <div class="mb-5 animate-on-scroll">
                            <div class="p-3 rounded-4 bg-white-5 border border-subtle d-flex align-items-center justify-content-between transition-smooth hover-bg-light">
                                <div class="d-flex align-items-center">
                                    <div class="fs-3 text-info me-3"><i class="bi bi-shop"></i></div>
                                    <div>
                                        <p class="mb-0 fw-bold text-white small">Become a Seller</p>
                                        <p class="mb-0 x-small text-muted">Open your own cosmic storefront</p>
                                    </div>
                                </div>
                                <div class="form-check form-switch ps-0">
                                    <input class="form-check-input ms-0" type="checkbox" id="becomeSeller" ng-model="user.become_seller" 
                                        style="width: 40px; height: 20px; cursor: pointer;">
                                </div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-info text-white btn-lg w-100 py-3 fw-bold text-uppercase rounded-pill shadow-glow-info animate-on-scroll">
                            Initialize Registry
                        </button>
                    </form>

                    <div class="mt-5 text-center text-muted small animate-on-scroll">
                        Already have an identity? <a href="#!/login" class="text-info fw-bold text-decoration-none ms-1">Access Terminal</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .bg-white-5 { background: rgba(255,255,255,0.05); }
    .hover-bg-light:hover { background: rgba(255,255,255,0.08); }
    .shadow-glow-info { box-shadow: 0 0 20px rgba(13, 202, 240, 0.3); }
</style>
