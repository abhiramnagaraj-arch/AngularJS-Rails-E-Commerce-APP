
<div class="cart-sidebar" ng-class="{'open': isOpen}">
    <div class="cart-sidebar-header d-flex justify-content-between align-items-center p-3 border-bottom">
        <h5 class="mb-0 fw-bold text-white"><i class="bi bi-cart3 me-2"></i>Mini Cart</h5>
        <button class="btn-close btn-close-white" ng-click="toggleSidebar(false)"></button>
    </div>

    <div class="cart-sidebar-body p-0 overflow-auto" style="flex-grow: 1;">
        <!-- Loading State -->
        <div ng-if="isLoading" class="p-4 text-center">
            <div class="spinner-border text-primary spinner-border-sm" role="status"></div>
            <span class="ms-2 x-small text-muted">Updating...</span>
        </div>

        <!-- Empty State -->
        <div ng-if="cart.items.length === 0 && !isLoading" class="p-5 text-center fade-in">
            <div class="mb-3 opacity-25">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-cart-x" viewBox="0 0 16 16">
                    <path d="M7.354 5.646a.5.5 0 1 0-.708.708L7.793 7.5 6.646 8.646a.5.5 0 1 0 .708.708L8.5 8.207l1.146 1.147a.5.5 0 0 0 .708-.708L9.207 7.5l1.147-1.146a.5.5 0 0 0-.708-.708L8.5 6.793 7.354 5.646z"/>
                    <path d="M.5 1H2a.5.5 0 0 1 .485.379L2.89 3H14.5a.5.5 0 0 1 .49.598l-1 5a.5.5 0 0 1-.465.401l-9.397.472L4.415 11H13a.5.5 0 0 1 0 1H4a.5.5 0 0 1-.491-.408L2.01 3.607 1.61 2H.5a.5.5 0 0 1-.5-.5zM3.102 4l.84 4.479 9.144-.459L13.89 4H3.102zM5 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm7 0a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-7 1a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
                </svg>
            </div>
            <p class="text-muted small">Your signal buffer is empty</p>
            <a href="#!/products" class="btn btn-sm btn-outline-primary rounded-pill px-3" ng-click="toggleSidebar(false)">Browse Products</a>
        </div>

        <!-- Item List -->
        <div class="cart-items-list stagger-children">
            <div ng-repeat="item in cart.items track by item.product_id" class="cart-sidebar-item p-3 border-bottom border-white-5 d-flex align-items-center transition-smooth">
                <div class="item-img-container me-3">
                    <img ng-src="{{item.product.image_url || 'https://dummyimage.com/60x60/dee2e6/6c757d.png&text=No+Img'}}" 
                         class="rounded shadow-sm shadow-glow" alt="{{item.product.name}}">
                </div>
                <div class="item-info flex-grow-1 min-w-0">
                    <h6 class="mb-1 text-white text-truncate small fw-bold">{{item.product.name}}</h6>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="x-small text-primary-glow fw-bold">₹{{item.product.price}}</span>
                        <div class="qty-controls d-flex align-items-center bg-white-5 rounded-pill px-2 border border-white-10">
                            <button class="btn btn-link p-0 text-muted x-small" ng-click="updateQuantity(item.product_id, -1)" ng-disabled="isLoading">
                                <i class="bi bi-dash"></i>
                            </button>
                            <span class="mx-2 x-small text-white fw-bold">{{item.quantity}}</span>
                            <button class="btn btn-link p-0 text-muted x-small" ng-click="updateQuantity(item.product_id, 1)" ng-disabled="isLoading">
                                <i class="bi bi-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <button class="btn btn-link p-0 text-danger-glow-text ms-2 hover-scale" ng-click="removeItem(item.product_id)" ng-disabled="isLoading">
                   <i class="bi bi-trash3 small"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="cart-sidebar-footer p-3 border-top bg-white-5 shadow-lg-up">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="text-muted small">Total Quantum Yield</span>
            <span class="h6 mb-0 fw-bold text-white">₹{{cart.total | number:2}}</span>
        </div>
        <div class="d-grid gap-2">
            <button class="btn btn-primary rounded-pill py-2 fw-bold" ng-click="goToCheckout()" ng-disabled="cart.items.length === 0">
                GO TO CHECKOUT <i class="bi bi-arrow-right ms-1"></i>
            </button>
            <button class="btn btn-link btn-sm text-muted text-decoration-none" ng-click="toggleSidebar(false)">
                Keep Transmission Buffer Open
            </button>
        </div>
    </div>
</div>
