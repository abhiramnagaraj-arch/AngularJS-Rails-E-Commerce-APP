<div class="container mt-4">
    <!-- Header Section -->
    <div class="row mb-5 align-items-center animate-on-scroll">
        <div class="col-md-8">
            <p class="section-eyebrow mb-1">✦ CURATED COLLECTION</p>
            <h2 class="section-title mb-2">Browse Products</h2>
            <p class="text-muted">Premium quality products from our top-rated sellers.</p>
        </div>
        <div class="col-md-4">
            <div class="glass-filter-box p-3 rounded-4 border">
                <label class="form-label small fw-bold text-muted text-uppercase mb-2">Filter by Category</label>
                <select class="form-select glass-select" ng-model="selectedCategory"
                    ng-change="filterProducts()" ng-options="cat.id as cat.name for cat in categories">
                    <option value="">All Categories</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Product Grid -->
    <div class="row stagger-children">
        <!-- Skeleton Loading State (Simplified) -->
        <div class="col-6 col-md-4 col-lg-3 mb-4" ng-show="!products">
            <div class="card h-100 product-card shimmer">
                <div style="height: 200px; background: rgba(255,255,255,0.05);"></div>
                <div class="card-body">
                    <div class="h-25 w-50 bg-secondary mb-2 rounded"></div>
                    <div class="h-25 w-100 bg-secondary mb-2 rounded"></div>
                </div>
            </div>
        </div>

        <div class="col-6 col-md-4 col-lg-3 mb-4 animate-on-scroll" ng-repeat="product in products">
            <div class="card h-100 product-card" data-tilt>
                <!-- Image Container -->
                <div class="product-img-container d-flex align-items-center justify-content-center overflow-hidden position-relative">
                    <img ng-src="{{product.image_url || 'https://dummyimage.com/300x300/dee2e6/6c757d.png&text=No+Image'}}"
                        class="img-fluid w-100 h-100" style="object-fit: cover;" alt="{{product.name}}">
                    <div class="product-img-overlay"></div>
                </div>

                <!-- Content -->
                <div class="card-body p-3 d-flex flex-column">
                    <div class="mb-2">
                        <a href="#!/products?category={{product.category.name}}"
                            class="badge bg-primary-subtle text-decoration-none px-2 py-1">{{product.category.name}}</a>
                    </div>
                    <h6 class="card-title text-truncate mb-2 fw-bold" title="{{product.name}}">{{product.name}}</h6>
                    <div class="mt-auto d-flex align-items-center justify-content-between">
                        <span class="price-tag fs-5">₹{{product.price}}</span>
                    </div>
                </div>

                <!-- Footer CTA -->
                <div class="card-footer bg-transparent border-0 p-3 pt-0 d-grid gap-2">
                    <div class="row g-2">
                        <div class="col-4">
                            <a href="#!/products/{{product.id}}"
                                class="btn btn-outline-info w-100 rounded-3 p-2" title="View Details">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-eye" viewBox="0 0 16 16">
                                  <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.827 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
                                  <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
                                </svg>
                            </a>
                        </div>
                        <div class="col-8">
                            <button class="btn btn-primary btn-sm w-100 fw-bold rounded-3 py-2" ng-click="addToCart(product)" ng-if="getCartQuantity(product.id) === 0">
                                Add to Cart
                            </button>
                            <div class="qty-control d-flex align-items-center justify-content-between rounded-3 border border-primary px-2 py-1" ng-if="getCartQuantity(product.id) > 0">
                                <button class="btn btn-sm btn-link text-primary p-0" ng-click="decreaseQuantity(product)">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-dash" viewBox="0 0 16 16">
                                      <path d="M4 8a.5.5 0 0 1 .5-.5h7a.5.5 0 0 1 0 1h-7A.5.5 0 0 1 4 8z"/>
                                    </svg>
                                </button>
                                <span class="fw-bold text-white">{{getCartQuantity(product.id)}}</span>
                                <button class="btn btn-sm btn-link text-primary p-0" ng-click="increaseQuantity(product)">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-plus" viewBox="0 0 16 16">
                                      <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4z"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div class="col-12 text-center py-5 animate-on-scroll" ng-show="products && products.length == 0">
            <div class="empty-cosmic-box p-5 rounded-4 border bg-glass">
                <div class="fs-1 mb-3">🌌</div>
                <h4 class="text-white">No products found in this category.</h4>
                <p class="text-muted">Try adjusting your filters or browsing all categories.</p>
                <button class="btn btn-outline-primary mt-3 px-4 rounded-pill" ng-click="selectedCategory=''; filterProducts()">Clear Filters</button>
            </div>
        </div>
    </div>
</div>

<style>
    .glass-filter-box {
        background: var(--bg-glass);
        backdrop-filter: blur(10px);
        border-color: var(--border-subtle) !important;
    }

    .product-img-container {
        height: 220px;
        background: rgba(255, 255, 255, 0.02);
    }

    .product-img-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to bottom, transparent 60%, rgba(9, 14, 26, 0.6));
        opacity: 0;
        transition: opacity var(--transition-smooth);
    }

    .product-card:hover .product-img-overlay {
        opacity: 1;
    }

    .empty-cosmic-box {
        max-width: 500px;
        margin: 0 auto;
    }

    /* Shimmer effect for skeleton */
    .shimmer {
        position: relative;
        overflow: hidden;
    }

    .shimmer::after {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
        animation: shimmer-swipe 1.5s infinite;
    }

    @keyframes shimmer-swipe {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
    }
</style>
